<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="auth-container" class="container">
    <div class="auth-box hidden" id="login-box">
      <h2>Connexion</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required />
        </div>
        <div class="form-group">
          <label for="login-password">Mot de passe</label>
          <input type="password" id="login-password" required />
        </div>
        <button type="submit" class="btn">Se connecter</button>
      </form>
      <p class="toggle-text">Déjà un compte ? <a href="/auth/login">Se connecter</a></p>
    </div>

    <div class="auth-box" id="register-box">
      <h2>Inscription</h2>
      <form id="register-form" action="">
        <div class="form-group">
          <label for="reg-avatar">Photo de profil (Optionnel)</label>
          <input type="file" id="reg-avatar" accept="image/*" />
        </div>
        <div class="form-group">
          <label for="reg-fullname">Nom complet</label>
          <input type="text" id="reg-fullname" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Mot de passe</label>
          <input type="password" id="reg-password" required />
        </div>
        <button type="submit" class="btn">S'inscrire</button>
      </form>
      <p class="toggle-text">Déjà un compte ? <a href="/auth/login">Se connecter</a></p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
