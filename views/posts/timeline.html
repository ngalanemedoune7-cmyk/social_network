<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app-container" class="hidden">
    <div class="header-bar" style="display:flex; justify-content:space-between; align-items:center; background:white; padding:15px 20px; border-radius:8px; box-shadow:0 1px 2px rgba(0,0,0,0.1); margin-bottom:20px;">
      <h1 style="margin:0;">Social Network</h1>
      <div style="display:flex; align-items:center; gap:15px;">
        <button id="search-btn" class="btn" style="background:#e4e6eb; color:#1877f2; border:none; padding:8px 16px; border-radius:20px; cursor:pointer; font-weight:bold;">🔍 Recherche</button>
        <button id="admin-btn" class="btn hidden-admin" style="background:#e4e6eb; color:#1877f2; border:none; padding:8px 16px; border-radius:20px; cursor:pointer; font-weight:bold; display:none;">⚙️ Admin</button>
        <span id="user-display-name"></span>
        <button id="logout-btn" class="btn btn-danger" style="background:#dc3545; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:bold;">Déconnexion</button>
      </div>
    </div>

    <div class="main-layout" style="display:flex; gap:20px; align-items:flex-start;">
      <div class="left-column" style="flex:2; min-width:0;">
        <div class="form-container" style="background:white; padding:20px; border-radius:8px; box-shadow:0 1px 2px rgba(0,0,0,0.1); margin-bottom:20px;">
          <form id="create-post-form">
            <h3 style="margin-top:0;">Exprimer vous, qu'avez-vous en tête ?</h3>
            <textarea id="post-content" placeholder="Partagez quelque chose..." style="width:100%; height:80px; padding:10px; border:1px solid #ccd0d5; border-radius:6px; resize:none; box-sizing:border-box; font-family:inherit;"></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
              <label class="btn-upload" style="background:#e4e6eb; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:14px;">
                📷 Ajouter une image
                <input type="file" id="post-image" accept="image/*" style="display:none;" />
              </label>
              <span id="file-chosen" style="font-size:13px; color:#65676b; margin-left:10px; flex-grow:1;">Aucun fichier choisi</span>
              <button type="submit" class="btn btn-primary" style="background:#1877f2; color:white; border:none; padding:8px 20px; border-radius:6px; cursor:pointer; font-weight:bold;">Publier</button>
            </div>
          </form>
        </div>
        <div id="timeline-container"></div>
      </div>

      <div class="right-column" style="flex:1; max-width:360px; position:sticky; top:20px;">
        <div id="friends-sidebar-container"></div>

        <div id="notification-panel" style="background:white; padding:20px; border-radius:8px; box-shadow:0 1px 2px rgba(0,0,0,0.1); margin-top:20px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <h3 style="margin:0; color:#1877f2; font-size:16px;">🔔 Notifications</h3>
            <span id="notification-count" class="notification-badge">0</span>
          </div>
          <div id="notification-list" style="max-height:260px; overflow-y:auto; display:flex; flex-direction:column; gap:8px;">
            <p style="color:#65676b; font-size:13px;">Aucune notification pour le moment.</p>
          </div>
          <button id="mark-all-read" class="btn btn-secondary" style="margin-top:12px; width:100%;">Tout marquer lu</button>
        </div>

        <div style="background:white; padding:20px; border-radius:8px; box-shadow:0 1px 2px rgba(0,0,0,0.1); margin-top:20px;">
          <h3 style="margin-top:0; margin-bottom:15px; color:#1877f2;">👥 Utilisateurs en ligne</h3>
          <div id="online-users-list" style="max-height:400px; overflow-y:auto;">
            <p style="color:#65676b; font-size:13px;">Aucun utilisateur en ligne</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="chat-box" class="chat-box" style="display:none;">
    <div class="chat-header" onclick="document.getElementById('chat-box').style.display='none'">Chat Privé ✖</div>
    <div id="messages-container" class="messages-container"></div>
    <input type="text" id="chat-input" class="chat-input" placeholder="Écrire un message...">
  </div>

  <div id="search-modal" class="modal hidden">
    <div class="modal-content">
      <span class="close-modal" onclick="document.getElementById('search-modal').classList.add('hidden')">&times;</span>
      <h2>Recherche</h2>
      <div class="search-container">
        <input type="text" id="searchInput" placeholder="Rechercher un utilisateur ou une publication..." />
        <button id="searchBtn" class="btn">Rechercher</button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>


  <div id="admin-modal" class="modal hidden">
    <div class="modal-content admin-content">
      <span class="close-modal" onclick="document.getElementById('admin-modal').classList.add('hidden')">&times;</span>
      <h2>Administration</h2>

      <div class="admin-tabs">
        <button class="tab-btn active" onclick="switchAdminTab('statistics')">Statistiques</button>
        <button class="tab-btn" onclick="switchAdminTab('users')">Utilisateurs</button>
        <button class="tab-btn" onclick="switchAdminTab('posts')">Modération</button>
      </div>

      <div id="statistics-tab" class="tab-content">
        <div class="stats-grid" id="stats-grid"></div>
      </div>

      <div id="users-tab" class="tab-content hidden">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Nom</th>
              <th>Email</th>
              <th>Inscription</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="users-table-body"></tbody>
        </table>
      </div>

      <div id="posts-tab" class="tab-content hidden">
        <div id="moderation-container"></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/chat.js"></script>
  <script src="/js/search-admin.js"></script>
</body>
</html>
